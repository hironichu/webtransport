on:
  pull_request:
    types: [review_requested, opened]
    branches:    
      - 'releases/**'
  push:
    branches:    
      - 'main'
      - 'releases/**'
      - 'testing/**'
      - 'feat/**'
      - 'fix/**'
      - 'dev/**'
concurrency:
  group: ${{ github.workflow }}-${{ !contains(github.event.pull_request.labels.*.name, 'test-flaky-ci') && github.head_ref || github.run_id }}
  cancel-in-progress: true

name: Webtransport CI
jobs:
  build:
    name: ${{ matrix.job }} ${{ matrix.profile }} ${{ matrix.os }}
    if: |
      github.event_name == 'push' ||
      !startsWith(github.event.pull_request.head.label, 'hironichu:')
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      matrix:
        include:
          - os: macos-latest
            job: test
            profile: debug
          - os: macos-latest
            job: test
            profile: release
          - os: windows-latest
            job: test
            profile: debug
          - os: windows-latest
            job: test
            profile: release
          - os: 'ubuntu-22.04'
            job: test
            profile: release
            use_sysroot: true
          - os: 'ubuntu-22.04'
            job: test
            profile: debug

          - os: 'ubuntu-22.04'
            job: lint
            profile: debug

          - os: 'self-hosted'
            job: test
            profile: debug

          - os: 'self-hosted'
            job: test
            profile: release
      fail-fast: ${{ github.event_name == 'pull_request' || (github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')) }}
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: full
    steps:
      - name: Configure git
        run: |
          git config --global core.symlinks true
          git config --global fetch.parallel 4
      - name: Clone repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2
          submodules: recursive
      - name: Create source tarballs (release, linux)
        if: |
          startsWith(matrix.os, 'ubuntu') &&
          matrix.profile == 'release' &&
          matrix.job == 'test' &&
          github.repository == 'hironichu/webtransport' &&
          startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p target/release
          tar --exclude=".git*" --exclude=target --exclude=third_party/prebuilt \
              -czvf target/release/webtransport.tar.gz -C .. webtransport

      - name: Setting Up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Install Deno from .land
        if: matrix.os != 'self-hosted'
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Install Deno from source
        if: matrix.os == 'self-hosted'
        run: |
          echo "Check if Deno is already installed"
          if ! type deno > /dev/null; then
            echo "Deno is not installed, installing..."
            curl -s https://gist.githubusercontent.com/LukeChannings/09d53f5c364391042186518c8598b85e/raw/ac8cd8c675b985edd4b3e16df63ffef14d1f0e24/deno_install.sh | sh
          else
            echo "Deno is already installed"
          fi
      - name: Error on warning
        run: echo "RUSTFLAGS=-D warnings" >> $GITHUB_ENV

      - name: Log versions
        shell: bash
        run: |
          rustc --version
          cargo --version
          deno --version
          
      - name: Cache build output (main)
        uses: actions/cache@v3
        if: (matrix.job == 'test' && matrix.profile == 'release') &&
            github.ref == 'refs/heads/main'
        with:
          path: |
            !./target/*/*.dll
            !./target/*/*.so
            !./target/*/*.dylib
          key: |
            16-cargo-target-${{ matrix.os }}-${{ matrix.profile }}-${{ github.sha }}
      - name: Cache build output (PR)
        uses: actions/cache@v3
        if: github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') &&
            matrix.job == 'test' && matrix.profile == 'release'
        with:
          path: |
            !./target/*/*.dll
            !./target/*/*.so
            !./target/*/*.dylib
          key: never_saved
          restore-keys: |
            16-cargo-target-${{ matrix.os }}-${{ matrix.profile }}-

      - name: Deno Format
        if: matrix.job == 'lint'
        run: deno task util:fmt

      - name: Deno lint
        if: matrix.job == 'lint'
        run: deno task util:lint

      - name: Build Debug
        if: |
          (!startsWith(matrix.os, 'self-hosted')) &&
          (matrix.job == 'test' && matrix.profile == 'debug')
        run: deno task build:debug

      - name: Build Debug ARM
        if: |
          (startsWith(matrix.os, 'self-hosted')) &&
          (matrix.job == 'test' && matrix.profile == 'debug') 
        run: |
          deno task build:debug-arm

      - name: Build release
        if: |
          (!startsWith(matrix.os, 'self-hosted')) &&
          (matrix.job == 'test' && matrix.profile == 'release') &&
          (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: deno task build:release

      - name: Build release Linux ARM
        if: |
          (startsWith(matrix.os, 'self-hosted')) &&
          (matrix.job == 'test' && matrix.profile == 'release') && (matrix.use_sysroot ||
          (github.repository == 'hironichu/webtransport' &&
          (github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/tags/'))))
        run: |
          deno task build:release-arm

      - name: Run deno test (debug)
        if: |
          matrix.job == 'test' && matrix.profile == 'debug' && !startsWith(github.ref, 'refs/tags/')
        run: |
          deno task test
      - name: Run deno test (release)
        if: |
          (matrix.job == 'test' && matrix.profile == 'release') &&
          (matrix.use_sysroot || (
          github.repository == 'hironichu/webtransport' &&
          github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')))
        run: |
          deno task test
      - name: Upload release to GitHub
        uses: softprops/action-gh-release@59c3b4891632ff9a897f99a91d7bc557467a3a22
        if: |
          (matrix.job == 'test' && matrix.profile == 'release') &&
          github.repository == 'hironichu/webtransport' &&
          github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            dist/webtransport.dll
            dist/libwebtransport.so
            dist/libwebtransport_aarch64.so
            dist/libwebtransport.dylib
          draft: true