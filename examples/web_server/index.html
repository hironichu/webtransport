<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>DEMO WEBTRANSPORT</title>
	<style>
		body {
			background-color: #1d1d1e;
			color: #fff;
			font-family: monospace;
		}

		h1 {
			text-align: center;
		}

		h2 {
			text-align: center;
		}
	</style>
</head>

<body>
	<h1>DEMO WEBTRANSPORT</h1>
	<h2>Server IP : HOST_IP</h2>
	<!-- TBA Stats -->
	<script type="module">
		const decoder = new TextDecoder();
		const res = [];
		async function readData(readable) {
			console.log("start reading")
			const reader = readable.getReader();
			while (true) {
				const { value, done } = await reader.read();
				if (done) {
					break;
				}
				res.push(decoder.decode(value));
			}
		}
		window.TESTFN = () => {
			//Check if there are dups in the res array
			const dups = res.filter((item, index) => res.indexOf(item) != index);
			if (dups.length > 0) {
				console.log("DUPS : ", dups);
			}
		}
		window.serveurDEMO = null;
		window.writeDDBN = null;
		const webtransport = new WebTransport('https://HOST_IP:4433/', {
			congestionControl: "throughput",
			allowPooling: true,
			serverCertificateHashes: [{
				algorithm: "sha-256",
				value: new Uint8Array(CERT_HASH)
			}]
		})
		await webtransport.ready;
		window.serveurDEMO = webtransport;
		console.log(webtransport)
		webtransport.onstatechange = (event) => {
			console.log("EVENT : ", event);
		}
		try {
			const writable = await webtransport.datagrams.writable;
			const readable = await webtransport.datagrams.readable;
			window.writeDDBN = await webtransport.datagrams.writable.getWriter();
			readData(readable);
			let int2 = 0;
			const encoder = new TextEncoder();
			console.log("start sending")
			performance.mark("start");
			while (1) {
				if (int2 === 500) {
					break;
				}
				await window.writeDDBN.write(encoder.encode(int2++));
			}

		} catch (e) {
			console.error(e);
		}
	</script>
</body>

</html>
